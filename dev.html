<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satellite Ground Track Planner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛰️</text></svg>" />
</head>
<body>
  <div id="app">
    <aside id="sidebar"></aside>
    <main id="map-container">
      <div id="pass-countdown-overlay"></div>
      <div id="map-search">
        <input type="text" id="map-search-input" placeholder="Konum ara..." autocomplete="off" />
        <div id="map-search-results"></div>
      </div>
      <div id="map"></div>
      <div id="coords-display"></div>
    </main>
    <aside id="right-panel"></aside>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
